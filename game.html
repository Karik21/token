<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Token Fortune</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1040 50%, #0d0d2b 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
    }
    .container { width: 90%; max-width: 400px; padding: 20px 0 80px 0; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 28px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { font-size: 14px; opacity: 0.6; margin-top: 5px; }
    .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .game-btn {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
      padding: 25px 10px; text-align: center; cursor: pointer; transition: all 0.25s;
    }
    .game-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.12); }
    .game-btn .emoji { font-size: 44px; display: block; margin-bottom: 12px; }
    .game-btn .title { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
    .game-btn .subtitle { font-size: 12px; opacity: 0.55; margin-top: 4px; }
    .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      visibility: hidden; opacity: 0; transition: 0.25s;
    }
    .modal.active { visibility: visible; opacity: 1; }
    .modal-content {
      background: rgba(30,30,50,0.95); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px; padding: 25px; width: 85%; max-width: 320px;
      text-align: center; backdrop-filter: blur(20px);
    }
    .modal-content h3 { margin-bottom: 15px; font-size: 20px; }
    .number-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
    .number-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 14px; border-radius: 14px; font-size: 22px; cursor: pointer; transition: 0.2s;
    }
    .number-btn:active { background: rgba(102,126,234,0.4); transform: scale(0.9); }
    .btn {
      background: linear-gradient(135deg, #667eea, #764ba2); border: none;
      color: white; padding: 14px; border-radius: 14px; font-size: 16px;
      font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px;
    }
    .btn:active { transform: scale(0.95); }
    .close-btn { background: rgba(255,255,255,0.15); margin-top: 8px; }
    @keyframes confettiFall {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .particle {
      position: fixed; width: 10px; height: 10px; border-radius: 50%;
      animation: confettiFall 2s ease-in forwards; z-index: 200; pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎲 TOKEN FORTUNE</h1>
      <p>Пульт управления</p>
    </div>
    <div class="game-grid">
      <div class="game-btn" onclick="openDiceModal()"><span class="emoji">🎲</span><div class="title">КОСТИ</div><div class="subtitle">Бросить</div></div>
      <div class="game-btn" onclick="sendCommand('join_contest')"><span class="emoji">🏆</span><div class="title">КОНКУРС</div><div class="subtitle">Участвовать</div></div>
      <div class="game-btn" onclick="sendCommand('bonus')"><span class="emoji">⏰</span><div class="title">БОНУС</div><div class="subtitle">Забрать</div></div>
      <div class="game-btn" onclick="sendCommand('stats')"><span class="emoji">📊</span><div class="title">СТАТИСТИКА</div><div class="subtitle">Мои успехи</div></div>
      <div class="game-btn" onclick="sendCommand('achievements')"><span class="emoji">🏅</span><div class="title">ДОСТИЖЕНИЯ</div><div class="subtitle">Коллекция</div></div>
      <div class="game-btn" onclick="sendCommand('help')"><span class="emoji">❓</span><div class="title">ПОМОЩЬ</div><div class="subtitle">Инструкция</div></div>
    </div>
  </div>

  <div class="modal" id="diceModal">
    <div class="modal-content">
      <h3>🎲 Бросок костей</h3>
      <p>Ставка: <b id="betAmount">100</b> 🪙</p>
      <input type="range" min="10" max="100000" value="100" id="betSlider" oninput="document.getElementById('betAmount').textContent = this.value">
      <p>Выбери число:</p>
      <div class="number-grid">
        <button class="number-btn" onclick="rollDice(1)">1️⃣</button>
        <button class="number-btn" onclick="rollDice(2)">2️⃣</button>
        <button class="number-btn" onclick="rollDice(3)">3️⃣</button>
        <button class="number-btn" onclick="rollDice(4)">4️⃣</button>
        <button class="number-btn" onclick="rollDice(5)">5️⃣</button>
        <button class="number-btn" onclick="rollDice(6)">6️⃣</button>
      </div>
      <button class="btn close-btn" onclick="closeDiceModal()">Закрыть</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    function sendCommand(cmd) {
      tg.sendData(JSON.stringify({ command: cmd }));
    }

    function openDiceModal() { document.getElementById('diceModal').classList.add('active'); }
    function closeDiceModal() { document.getElementById('diceModal').classList.remove('active'); }

    function rollDice(number) {
      const bet = document.getElementById('betSlider').value;
      tg.sendData(JSON.stringify({ command: 'dice', bet: bet, number: number }));
      closeDiceModal();
      createConfetti();
    }

    function createConfetti() {
      const colors = ['#ffd700','#ff6b6b','#4ecdc4','#45b7d1','#f7dc6f','#bb8fce'];
      for (let i=0; i<20; i++) {
        setTimeout(() => {
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.left = Math.random()*100 + '%';
          p.style.background = colors[Math.floor(Math.random()*colors.length)];
          p.style.width = p.style.height = (Math.random()*8+4) + 'px';
          p.style.animationDuration = (Math.random()*1.5+1) + 's';
          document.body.appendChild(p);
          setTimeout(() => p.remove(), 2000);
        }, i*25);
      }
    }
  </script>
</body>
</html>
