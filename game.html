<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Token Fortune</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050510;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-image: 
                radial-gradient(ellipse at 30% 20%, rgba(120,80,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(255,60,120,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(100,200,255,0.04) 0%, transparent 60%);
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin: 0 auto;
            padding: 40px 0 90px;
        }

        /* ===== ШАПКА ===== */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }

        .logo-emoji {
            font-size: 70px;
            display: block;
            animation: floatCube 3s ease-in-out infinite;
            filter: drop-shadow(0 20px 40px rgba(120,80,255,0.4));
        }

        @keyframes floatCube {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .logo-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: rgba(120,80,255,0.15);
            border-radius: 50%;
            filter: blur(25px);
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
        }

        .title {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .online-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            background: rgba(255,255,255,0.04);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.06);
            letter-spacing: 1px;
        }

        .live-dot {
            width: 8px; height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: livePulse 1.5s ease-in-out infinite;
            box-shadow: 0 0 12px #22c55e;
        }

        @keyframes livePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ===== СЕТКА ===== */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 28px 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .card:active {
            transform: scale(0.92);
            background: rgba(120,80,255,0.1);
            border-color: rgba(120,80,255,0.4);
            box-shadow: 0 0 40px rgba(120,80,255,0.2);
        }

        .card .icon {
            font-size: 46px;
            display: block;
            margin-bottom: 10px;
            transition: transform 0.3s;
        }

        .card:active .icon {
            transform: scale(1.2);
        }

        .card .label {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1.5px;
        }

        .card .tag {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 9px;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 15px;
            letter-spacing: 1px;
        }

        .tag-hot {
            background: #ef4444;
            animation: tagGlow 1s ease-in-out infinite;
        }

        .tag-live {
            background: #ec4899;
            animation: tagGlow 1.5s ease-in-out infinite;
        }

        @keyframes tagGlow {
            0%, 100% { box-shadow: 0 0 8px currentColor; }
            50% { box-shadow: 0 0 20px currentColor, 0 0 35px currentColor; }
        }

        /* ===== МОДАЛКА ===== */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(25px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.35s ease;
        }

        .modal.open {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: #0c0c1d;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 30px 24px;
            width: 88%;
            max-width: 350px;
            text-align: center;
            transform: scale(0.85) translateY(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal.open .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dice-big {
            font-size: 90px;
            margin: 15px 0;
            display: block;
            filter: drop-shadow(0 15px 30px rgba(120,80,255,0.4));
            transition: transform 0.1s;
        }

        .dice-big.shaking {
            animation: shake 0.6s ease-out;
        }

        @keyframes shake {
            0% { transform: rotate(0deg) scale(0.3); }
            25% { transform: rotate(90deg) scale(1.2); }
            50% { transform: rotate(270deg) scale(0.9); }
            75% { transform: rotate(450deg) scale(1.1); }
            100% { transform: rotate(720deg) scale(1); }
        }

        .bet-display {
            font-size: 26px;
            font-weight: 900;
            color: #fbbf24;
            margin: 8px 0;
        }

        .num-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .num {
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.08);
            color: #fff;
            padding: 16px;
            border-radius: 16px;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.25s;
        }

        .num:active {
            background: #7c3aed;
            border-color: #a78bfa;
            transform: scale(0.85);
            box-shadow: 0 0 35px rgba(124,58,237,0.7);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1.5px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: #fff;
            box-shadow: 0 10px 30px rgba(124,58,237,0.3);
        }

        .btn-primary:active {
            transform: scale(0.94);
            box-shadow: 0 5px 20px rgba(236,72,153,0.5);
        }

        .btn-ghost {
            background: rgba(255,255,255,0.06);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ===== ПОЛЗУНОК ===== */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
            margin: 12px 0;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: 3px solid #7c3aed;
            box-shadow: 0 0 20px rgba(124,58,237,0.6);
        }

        /* ===== ТОСТ ===== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #0c0c1d;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            z-index: 300;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0);
        }

        /* ===== КОНФЕТТИ ===== */
        .conf {
            position: fixed;
            z-index: 250;
            pointer-events: none;
            animation: confFall var(--t) ease-out forwards;
        }

        @keyframes confFall {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0); opacity: 0; }
        }

        /* ===== НИЖНЕЕ МЕНЮ ===== */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            background: rgba(5,5,16,0.95);
            backdrop-filter: blur(30px);
            display: flex;
            justify-content: space-around;
            padding: 12px 8px 22px;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 50;
        }

        .nav-item {
            text-align: center;
            opacity: 0.35;
            transition: all 0.3s;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .nav-item.active { opacity: 1; color: #a78bfa; }

        .nav-item span {
            font-size: 24px;
            display: block;
            margin-bottom: 3px;
        }

        .nav-item:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <div class="logo">
                <div class="logo-glow"></div>
                <span class="logo-emoji">🎲</span>
            </div>
            <h1 class="title">TOKEN FORTUNE</h1>
            <div class="online-badge">
                <span class="live-dot"></span> ОНЛАЙН
            </div>
        </div>

        <!-- Сетка -->
        <div class="grid">
            <div class="card" onclick="openDice()">
                <span class="tag tag-hot">ГОРЯЧО</span>
                <span class="icon">🎲</span>
                <div class="label">КОСТИ</div>
            </div>

            <div class="card" onclick="sendCmd('join_contest')">
                <span class="tag tag-live">LIVE</span>
                <span class="icon">🏆</span>
                <div class="label">КОНКУРС</div>
            </div>

            <div class="card" onclick="sendCmd('bonus')">
                <span class="icon">🎁</span>
                <div class="label">БОНУС</div>
            </div>

            <div class="card" onclick="sendCmd('stats')">
                <span class="icon">📊</span>
                <div class="label">СТАТИСТИКА</div>
            </div>

            <div class="card" onclick="sendCmd('achievements')">
                <span class="icon">🏅</span>
                <div class="label">ДОСТИЖЕНИЯ</div>
            </div>

            <div class="card" onclick="sendCmd('help')">
                <span class="icon">ℹ️</span>
                <div class="label">ПОМОЩЬ</div>
            </div>
        </div>
    </div>

    <!-- Модалка -->
    <div class="modal" id="diceModal">
        <div class="modal-box">
            <h2 class="modal-title">БРОСОК КОСТЕЙ</h2>
            <span class="dice-big" id="diceDisplay">🎲</span>
            <p style="opacity:0.5; font-size:12px; letter-spacing:1px;">СТАВКА</p>
            <div class="bet-display" id="betVal">100</div>
            <input type="range" min="10" max="100000" value="100" id="betSlider"
                   oninput="document.getElementById('betVal').textContent = Number(this.value).toLocaleString()">
            <p style="margin-top:16px; font-weight:700; letter-spacing:1px;">ВЫБЕРИ ЧИСЛО</p>
            <div class="num-row">
                <button class="num" onclick="roll(1)">1</button>
                <button class="num" onclick="roll(2)">2</button>
                <button class="num" onclick="roll(3)">3</button>
                <button class="num" onclick="roll(4)">4</button>
                <button class="num" onclick="roll(5)">5</button>
                <button class="num" onclick="roll(6)">6</button>
            </div>
            <button class="btn btn-ghost" onclick="closeDice()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <!-- Меню -->
    <div class="nav">
        <div class="nav-item active"><span>🏠</span>ГЛАВНАЯ</div>
        <div class="nav-item"><span>🏆</span>РЕЙТИНГ</div>
        <div class="nav-item"><span>👤</span>ПРОФИЛЬ</div>
        <div class="nav-item"><span>⚙️</span>ЕЩЁ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Тосты
        function toast(text) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.classList.add('visible');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('visible'), 1800);
        }

        // Конфетти
        function confetti(count = 45) {
            const e = ['✨','💎','🪙','⭐','💰','🎉','💜'];
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'conf';
                    c.style.left = '50%';
                    c.style.top = '45%';
                    c.textContent = e[Math.floor(Math.random() * e.length)];
                    c.style.fontSize = (Math.random() * 22 + 10) + 'px';
                    c.style.setProperty('--x', (Math.random() * 350 - 175) + 'px');
                    c.style.setProperty('--y', (Math.random() * -350 - 80) + 'px');
                    c.style.setProperty('--r', (Math.random() * 600 - 300) + 'deg');
                    c.style.setProperty('--t', (Math.random() * 1.4 + 0.8) + 's');
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 2200);
                }, i * 18);
            }
        }

        // Отправка команд
        function sendCmd(cmd) {
            tg.sendData(JSON.stringify({ command: cmd }));
            tg.HapticFeedback.impactOccurred('heavy');
            toast('✅ ГОТОВО');
        }

        // Кости
        function openDice() {
            document.getElementById('diceModal').classList.add('open');
            document.getElementById('diceDisplay').textContent = '🎲';
            document.getElementById('diceDisplay').classList.remove('shaking');
            tg.HapticFeedback.impactOccurred('light');
        }

        function closeDice() {
            document.getElementById('diceModal').classList.remove('open');
        }

        function roll(num) {
            const bet = document.getElementById('betSlider').value;
            const dice = document.getElementById('diceDisplay');
            dice.classList.add('shaking');

            const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
            let i = 0;
            const iv = setInterval(() => {
                dice.textContent = faces[Math.floor(Math.random() * 6)];
                i++;
                if (i >= 8) {
                    clearInterval(iv);
                    dice.textContent = faces[num - 1];
                    dice.classList.remove('shaking');
                    setTimeout(() => {
                        tg.sendData(JSON.stringify({ command: 'dice', bet: bet, number: num }));
                        closeDice();
                        confetti(55);
                        tg.HapticFeedback.notificationOccurred('success');
                        toast('🎲 БРОСОК!');
                    }, 350);
                }
            }, 65);
        }

        // Нижнее меню
        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
                this.classList.add('active');
                tg.HapticFeedback.impactOccurred('light');
                toast('📱 СКОРО');
            });
        });
    </script>
</body>
</html>
