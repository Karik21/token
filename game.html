<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Token Fortune</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a14;
            --card: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --accent: #7c3aed;
            --accent2: #a855f7;
            --gold: #fbbf24;
            --pink: #ec4899;
            --cyan: #06b6d4;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ЗВЁЗДНЫЙ ФОН */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 92%;
            max-width: 420px;
            margin: 0 auto;
            padding: 20px 0 80px;
        }

        /* ШАПКА */
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-icon {
            font-size: 72px;
            display: block;
            animation: float 3s ease-in-out infinite, rotate3d 6s linear infinite;
            filter: drop-shadow(0 0 30px rgba(168,85,247,0.5));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateY(0deg); }
            25% { transform: translateY(-8px) rotateY(5deg); }
            75% { transform: translateY(4px) rotateY(-5deg); }
        }

        @keyframes rotate3d {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(10deg); }
        }

        .logo-text {
            font-size: 34px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent2), var(--pink), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            animation: shimmer 3s ease-in-out infinite;
            background-size: 200% 200%;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            font-size: 12px;
            opacity: 0.5;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.online { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-dot.players { background: var(--accent2); box-shadow: 0 0 10px var(--accent2); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        /* СЕТКА КНОПОК */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .game-btn {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 26px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .game-btn:nth-child(1) { animation-delay: 0.1s; }
        .game-btn:nth-child(2) { animation-delay: 0.2s; }
        .game-btn:nth-child(3) { animation-delay: 0.3s; }
        .game-btn:nth-child(4) { animation-delay: 0.4s; }
        .game-btn:nth-child(5) { animation-delay: 0.5s; }
        .game-btn:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .game-btn::before {
            content: '';
            position: absolute;
            top: var(--mouse-y, 50%);
            left: var(--mouse-x, 50%);
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(168,85,247,0.4) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .game-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .game-btn:active {
            transform: scale(0.92);
            border-color: var(--accent2);
            box-shadow: 0 0 30px rgba(168,85,247,0.3);
        }

        .game-btn .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            transition: transform 0.3s;
        }

        .game-btn:active .icon {
            transform: scale(1.2) rotate(-10deg);
        }

        .game-btn .title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .game-btn .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--pink);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 20px;
            z-index: 2;
            animation: pulse 2s ease-in-out infinite;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal.show {
            visibility: visible;
            opacity: 1;
        }

        .modal.show .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-box {
            background: linear-gradient(145deg, #1a1a2e, #0f0c29);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 32px;
            padding: 30px 24px;
            width: 88%;
            max-width: 350px;
            text-align: center;
            transform: scale(0.8) translateY(40px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 80px rgba(168,85,247,0.1);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent2), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dice-display {
            font-size: 80px;
            margin: 15px 0;
            animation: diceRoll 0.6s ease-out;
        }

        @keyframes diceRoll {
            0% { transform: rotate(0deg) scale(0); }
            50% { transform: rotate(180deg) scale(1.3); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .bet-display {
            font-size: 22px;
            font-weight: 800;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(251,191,36,0.5);
        }

        .num-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .num-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .num-btn:hover {
            border-color: var(--accent2);
            background: rgba(168,85,247,0.2);
        }

        .num-btn:active {
            transform: scale(0.85);
            background: var(--accent2);
            border-color: var(--accent2);
            box-shadow: 0 0 30px rgba(168,85,247,0.6);
        }

        .num-btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .num-btn:active::after {
            width: 200px;
            height: 200px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(124,58,237,0.3);
        }

        .btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(124,58,237,0.5);
        }

        .btn-close {
            background: rgba(255,255,255,0.08);
            margin-top: 8px;
            box-shadow: none;
        }

        /* ПОЛЗУНОК */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
            margin: 15px 0;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent2);
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(168,85,247,0.6);
            transition: transform 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        /* ТОСТ УВЕДОМЛЕНИЕ */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: linear-gradient(135deg, var(--accent), var(--pink));
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            z-index: 300;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(236,72,153,0.4);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* КОНФЕТТИ */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 250;
            animation: confettiFall var(--fall-duration) ease-in forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100vh) rotate(0deg) scale(1);
                opacity: 1;
            }
            80% { opacity: 1; }
            100% {
                transform: translateY(110vh) rotate(var(--rotation)) scale(0.3);
                opacity: 0;
            }
        }

        /* РИПЛ-ЭФФЕКТ */
        .ripple {
            position: fixed;
            border-radius: 50%;
            background: rgba(168,85,247,0.4);
            transform: scale(0);
            animation: ripple 0.6s ease-out;
            pointer-events: none;
            z-index: 200;
        }

        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        /* НИЖНЕЕ МЕНЮ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,20,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 10px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 50;
        }

        .nav-item {
            text-align: center;
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.3s;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .nav-item.active {
            opacity: 1;
            color: var(--accent2);
        }

        .nav-item .nav-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 3px;
            transition: transform 0.3s;
        }

        .nav-item:active .nav-icon {
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <!-- Звёздный фон -->
    <div class="stars" id="stars"></div>

    <!-- Тост -->
    <div class="toast" id="toast"></div>

    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <span class="logo-icon">🎲</span>
            <h1 class="logo-text">TOKEN FORTUNE</h1>
            <div class="status-bar">
                <span><span class="status-dot online"></span> ОНЛАЙН</span>
                <span><span class="status-dot players"></span> 2.4K</span>
            </div>
        </div>

        <!-- Сетка -->
        <div class="game-grid">
            <div class="game-btn" onclick="openDice()">
                <span class="badge">🔥</span>
                <span class="icon">🎲</span>
                <div class="title">КОСТИ</div>
            </div>

            <div class="game-btn" onclick="sendCmd('join_contest')">
                <span class="badge">LIVE</span>
                <span class="icon">🏆</span>
                <div class="title">КОНКУРС</div>
            </div>

            <div class="game-btn" onclick="sendCmd('bonus')">
                <span class="icon">🎁</span>
                <div class="title">БОНУС</div>
            </div>

            <div class="game-btn" onclick="sendCmd('stats')">
                <span class="icon">📊</span>
                <div class="title">СТАТИСТИКА</div>
            </div>

            <div class="game-btn" onclick="sendCmd('achievements')">
                <span class="icon">🏅</span>
                <div class="title">ДОСТИЖЕНИЯ</div>
            </div>

            <div class="game-btn" onclick="sendCmd('help')">
                <span class="icon">ℹ️</span>
                <div class="title">ПОМОЩЬ</div>
            </div>
        </div>
    </div>

    <!-- Модалка КОСТИ -->
    <div class="modal" id="diceModal">
        <div class="modal-box">
            <h2 class="modal-title">🎲 БРОСОК КОСТЕЙ</h2>
            <div class="dice-display" id="diceEmoji">🎲</div>
            <p style="margin-bottom: 5px;">СТАВКА</p>
            <div class="bet-display" id="betVal">100</div>
            <input type="range" min="10" max="100000" value="100" id="betSlider"
                   oninput="updateBet(this.value)">
            <p style="margin-top: 15px; font-weight: 700;">ВЫБЕРИ ЧИСЛО</p>
            <div class="num-grid">
                <button class="num-btn" onclick="rollDice(1)">1</button>
                <button class="num-btn" onclick="rollDice(2)">2</button>
                <button class="num-btn" onclick="rollDice(3)">3</button>
                <button class="num-btn" onclick="rollDice(4)">4</button>
                <button class="num-btn" onclick="rollDice(5)">5</button>
                <button class="num-btn" onclick="rollDice(6)">6</button>
            </div>
            <button class="btn-primary btn-close" onclick="closeDice()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <!-- Нижнее меню -->
    <div class="bottom-nav">
        <div class="nav-item active"><span class="nav-icon">🏠</span>ГЛАВНАЯ</div>
        <div class="nav-item"><span class="nav-icon">🏆</span>РЕЙТИНГ</div>
        <div class="nav-item"><span class="nav-icon">👤</span>ПРОФИЛЬ</div>
        <div class="nav-item"><span class="nav-icon">⚙️</span>ЕЩЁ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ===== ЗВЁЗДНЫЙ ФОН =====
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', Math.random() * 3 + 's');
                container.appendChild(star);
            }
        }
        createStars();

        // ===== ТОСТ =====
        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ===== РИПЛ-ЭФФЕКТ =====
        function createRipple(e) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = (e.clientX || e.touches?.[0]?.clientX || window.innerWidth/2) + 'px';
            ripple.style.top = (e.clientY || e.touches?.[0]?.clientY || window.innerHeight/2) + 'px';
            ripple.style.width = ripple.style.height = '20px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // ===== КОНФЕТТИ =====
        function spawnConfetti(count = 40) {
            const emojis = ['✨', '💎', '🪙', '⭐', '🌟', '💰', '🎉', '🔥', '💫'];
            const colors = ['#fbbf24', '#a855f7', '#ec4899', '#06b6d4', '#22c55e', '#ef4444'];
            
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.top = '-20px';
                    p.style.width = (Math.random() * 14 + 6) + 'px';
                    p.style.height = (Math.random() * 14 + 6) + 'px';
                    p.style.background = colors[Math.floor(Math.random() * colors.length)];
                    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
                    p.style.setProperty('--fall-duration', (Math.random() * 2 + 2) + 's');
                    p.style.setProperty('--rotation', (Math.random() * 720 - 360) + 'deg');
                    p.textContent = Math.random() > 0.7 ? emojis[Math.floor(Math.random() * emojis.length)] : '';
                    p.style.fontSize = '16px';
                    p.style.display = 'flex';
                    p.style.alignItems = 'center';
                    p.style.justifyContent = 'center';
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 4000);
                }, i * 30);
            }
        }

        // ===== ОТПРАВКА КОМАНД =====
        function sendCmd(cmd) {
            tg.sendData(JSON.stringify({ command: cmd }));
            tg.HapticFeedback.impactOccurred('heavy');
            showToast('✅ КОМАНДА ОТПРАВЛЕНА');
        }

        // ===== КОСТИ =====
        function openDice() {
            document.getElementById('diceModal').classList.add('show');
            document.getElementById('diceEmoji').textContent = '🎲';
            tg.HapticFeedback.impactOccurred('light');
        }

        function closeDice() {
            document.getElementById('diceModal').classList.remove('show');
        }

        function updateBet(val) {
            document.getElementById('betVal').textContent = Number(val).toLocaleString();
        }

        function rollDice(number) {
            const bet = document.getElementById('betSlider').value;
            const emoji = document.getElementById('diceEmoji');
            
            // Анимация кубика
            const diceFaces = ['🎲', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            let count = 0;
            const rollInterval = setInterval(() => {
                emoji.textContent = diceFaces[Math.floor(Math.random() * 6) + 1];
                emoji.style.animation = 'none';
                emoji.offsetHeight;
                emoji.style.animation = 'diceRoll 0.3s ease-out';
                count++;
                if (count >= 8) {
                    clearInterval(rollInterval);
                    emoji.textContent = diceFaces[number];
                    emoji.style.animation = 'none';
                    emoji.offsetHeight;
                    emoji.style.animation = 'diceRoll 0.6s ease-out';
                    
                    // Отправка
                    setTimeout(() => {
                        tg.sendData(JSON.stringify({ command: 'dice', bet: bet, number: number }));
                        closeDice();
                        spawnConfetti(50);
                        tg.HapticFeedback.notificationOccurred('success');
                        showToast('🎲 СТАВКА СДЕЛАНА!');
                    }, 600);
                }
            }, 100);
        }

        // ===== КЛИК-РИПЛ НА КНОПКАХ =====
        document.querySelectorAll('.game-btn').forEach(btn => {
            btn.addEventListener('click', (e) => createRipple(e));
        });

        // ===== НИЖНЕЕ МЕНЮ =====
        document.querySelectorAll('.nav-item').forEach((item, index) => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                
                const actions = ['', 'leaderboard', 'profile', 'more'];
                if (index > 0) {
                    tg.HapticFeedback.impactOccurred('light');
                    showToast('📱 СКОРО БУДЕТ ДОСТУПНО');
                }
            });
        });

        // ===== МАГИЧЕСКОЕ СВЕЧЕНИЕ ПРИ ДВИЖЕНИИ МЫШИ (ДЕСКТОП) =====
        document.querySelectorAll('.game-btn').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                btn.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
                btn.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
            });
        });
    </script>
</body>
</html>
